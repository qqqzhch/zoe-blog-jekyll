# 站点配置
title: Zoe Blog
description: GitHub 商机挖掘系统 - 自动发现高价值项目并生成分析报告
baseurl: ""
url: "https://qqqzhch.github.io/zoe-blog-jekyll"
lang: zh-CN

# Build settings
markdown: kramdown
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - assets/css/scss/
  - themes/
