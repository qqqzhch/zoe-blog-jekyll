# 站点配置
title: GitHub 商机洞察
description: 自动发现高价值项目并生成商业分析与产品设计报告
baseurl: ""
url: "https://qqqzhch.github.io/zoe-blog-jekyll"
lang: zh-CN

# Build settings
markdown: kramdown

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - assets/css/scss/
  - themes/
