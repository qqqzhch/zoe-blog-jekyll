<!DOCTYPE html>
<html lang="{{ site.lang | default: "en" }}">
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      margin:0;
      padding:0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height:1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
      border-bottom: 2px solid #eee;
      margin-bottom: 40px;
    }
    
    header h1 {
      font-size: 2.5em;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    
    header p {
      font-size: 1.2em;
      color: #7f8c8d;
    }
    
    article {
      background: white;
      padding: 0;
    }
    
    article h2 {
      font-size: 2em;
      color: #2c3e50;
      margin-top: 40px;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    
    article h3 {
      font-size: 1.5em;
      color: #34495e;
      margin-top: 30px;
      margin-bottom: 15px;
    }
    
    article p {
      margin-bottom: 1em;
    }
    
    article small {
      color: #7f8c8d;
      font-size: 0.9em;
    }
    
    a {
      color: #3498db;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    footer {
      text-align: center;
      padding: 40px 0;
      margin-top: 60px;
      border-top: 2px solid #eee;
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </header>
  
  <main>
    <article>
      {{ content }}
    </article>
  </main>
  
  <footer>
    <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
    <p>
      <a href="{{ site.baseurl }}/">首页</a> |
      <a href="https://github.com/qqqzhch/zoe-blog-jekyll">GitHub</a>
    </p>
  </footer>
</body>
</html>
